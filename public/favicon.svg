<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 100 100">
  <defs>
    <mask id="faviconLogoMask">
      {/* Retain color for the squircle body */}
      <rect x="0" y="0" width="100" height="100" fill="white" />
      {/* Cutout the central logo circle */}
      <circle cx="50" cy="50" r="30" fill="black" />
      {/* Restore color for the internal details */}
      <circle cx="50" cy="35" r="6.5" fill="white" />
      <rect x="43.5" y="56" width="13" height="19" rx="6.5" fill="white" />
      <path d="M 20 50 L 50 50 A 15 15 0 1 0 35 35" fill="none" stroke="white" strokeWidth="5" strokeLinecap="round" />
      <path d="M 80 50 L 50 50 A 15 15 0 1 0 65 65" fill="none" stroke="white" strokeWidth="5" strokeLinecap="round" />
    </mask>
    <linearGradient id="sapphireGradientFavicon" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#4A95D6" />
      <stop offset="50%" stopColor="#1E6BB8" />
      <stop offset="100%" stopColor="#124B84" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="80" height="80" rx="24" fill="url(#sapphireGradientFavicon)" mask="url(#faviconLogoMask)" />
</svg>